<!DOCTYPE html>

<head>

<title>Character Studio</title>
<style>
:root {
  --bg:#061014; --panel:rgba(8,22,28,.96); --panel2:rgba(12,34,42,.98);
  --cyan:#00ffff; --gold:#e8c76e; --ink:#f5fbff; --muted:#a9c8d0;
  --line:rgba(0,255,255,.34); --shadow:0 18px 55px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;overflow:hidden;background:linear-gradient(135deg,#020607,#071014 48%,#101013);color:var(--ink);font-family:Georgia,"Times New Roman",serif;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(circle at center,black 0%,transparent 82%);}
.character-shell{position:relative;height:100vh;display:grid;grid-template-rows:auto 1fr;background:transparent;}
.character-header{position:relative;z-index:10;padding:28px clamp(62px,7vw,110px) 16px;border-bottom:1px solid var(--line);background:rgba(8,22,28,.96);box-shadow:0 14px 34px rgba(0,0,0,.35);}
.character-header h1{margin:0;text-align:center;color:var(--cyan);font-size:clamp(2rem,4vw,4.1rem);letter-spacing:.06em;text-shadow:0 0 22px rgba(0,255,255,.35);}
.character-note{max-width:1120px;margin:10px auto 0;text-align:center;color:var(--muted);line-height:1.55;font-size:1rem;}
.character-tabs{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:12px;margin-top:16px;}
.character-tabs button{border:1px solid rgba(0,255,255,.48);border-radius:999px;padding:12px 20px;min-width:150px;min-height:48px;background:transparent;color:var(--cyan);font:inherit;font-weight:900;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.25);}
.character-tabs button.active{background:linear-gradient(180deg,#64ffff,#00c6c6);color:#031014;}
.character-main{position:relative;min-height:0;padding:18px clamp(48px,5vw,74px) 18px;}
.studio-frame{display:none;width:100%;height:100%;border:1px solid var(--line);border-radius:24px;background:#061014;box-shadow:var(--shadow);}
.studio-frame.active{display:block;}
.scroll-control{position:fixed;z-index:30;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border:1px solid rgba(0,255,255,.28);background:rgba(4,14,18,.88);box-shadow:0 12px 30px rgba(0,0,0,.38);backdrop-filter:blur(8px);}
.scroll-control span{font-size:.72rem;color:var(--muted);font-weight:800;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.scroll-control.horizontal{left:clamp(54px,5vw,86px);right:clamp(54px,5vw,86px);height:42px;border-radius:999px;}
.scroll-control.top{top:8px;}
.scroll-control.bottom{bottom:8px;}
.scroll-control.vertical{top:150px;bottom:62px;width:42px;border-radius:999px;flex-direction:column;}
.scroll-control.left{left:8px;}
.scroll-control.right{right:8px;}
.scroll-control input[type="range"]{accent-color:var(--cyan);width:100%;min-width:0;}
.scroll-control.vertical input[type="range"]{writing-mode:vertical-lr;direction:rtl;appearance:slider-vertical;width:28px;height:100%;min-height:140px;}
.scroll-control button{width:32px;height:28px;border-radius:999px;border:1px solid rgba(0,255,255,.35);background:rgba(0,255,255,.12);color:var(--cyan);font-weight:900;cursor:pointer;}
.frame-status{position:fixed;right:58px;bottom:58px;z-index:31;border:1px solid rgba(0,255,255,.32);border-radius:999px;padding:8px 12px;background:rgba(4,14,18,.88);color:var(--muted);font-size:.82rem;}
.data-store{display:none!important}
@media(max-width:800px){.character-header{padding-left:54px;padding-right:54px}.character-main{padding-left:44px;padding-right:44px}.scroll-control.horizontal{left:48px;right:48px}.scroll-control.vertical{top:180px}.character-tabs button{min-width:120px}}
</style>


<style id="character-studio-outer-scroll-layout-fix-v2">
.character-main{padding:28px clamp(58px,5.5vw,96px) 76px!important;min-height:0!important;}
.studio-frame{height:calc(100vh - 230px)!important;min-height:620px!important;overflow:auto!important;}
.scroll-control{z-index:60!important;}
.scroll-control.horizontal{height:48px!important;left:clamp(62px,5vw,96px)!important;right:clamp(62px,5vw,96px)!important;padding-inline:12px!important;}
.scroll-control.top{top:10px!important;}
.scroll-control.bottom{bottom:10px!important;}
.scroll-control.vertical{top:166px!important;bottom:72px!important;width:48px!important;padding-block:12px!important;}
.scroll-control.left{left:10px!important;}
.scroll-control.right{right:10px!important;}
.scroll-control input[type="range"]{cursor:pointer!important;}
.frame-status{right:70px!important;bottom:68px!important;}
@media(max-width:800px){.character-main{padding-left:58px!important;padding-right:58px!important}.scroll-control.horizontal{left:54px!important;right:54px!important}.scroll-control.vertical{top:190px!important}}
</style>


<style id="character-outer-right-safe-scroll-fix-v3">
*,*::before,*::after{box-sizing:border-box;}
.character-main{padding:30px clamp(74px,6vw,118px) 84px clamp(74px,6vw,118px)!important;}
.studio-frame{box-sizing:border-box!important;width:100%!important;overflow:auto!important;}
.scroll-control.right{right:12px!important;}
.frame-status{right:72px!important;}
</style>

</head>

&lt;html lang="en"&gt;
&lt;head&gt;
&lt;base href="./"&gt;
&lt;meta charset="UTF-8" /&gt;

&lt;title&gt;Belavadös Race &amp; Class Name Generator&lt;/title&gt;
&lt;style&gt;
:root {
  --bg: #071014;
  --panel: rgba(8, 22, 28, 0.92);
  --panel-2: rgba(12, 34, 42, 0.95);
  --cyan: #00ffff;
  --cyan-soft: rgba(0,255,255,.16);
  --ink: #f5fbff;
  --muted: #a9c8d0;
  --gold: #e8c76e;
  --danger: #ff5a7a;
  --ok: #69ffb0;
  --border: rgba(0,255,255,.35);
  --shadow: 0 18px 55px rgba(0,0,0,.55);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, "Times New Roman", serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% 20%, rgba(0,255,255,.12), transparent 28%),
    radial-gradient(circle at 80% 10%, rgba(232,199,110,.08), transparent 20%),
    linear-gradient(135deg, #020607 0%, #071014 45%, #101013 100%);
}
body::before {
  content:"";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: radial-gradient(circle at center, black 0%, transparent 82%);
}
header {
  padding: 34px 22px 18px;
  text-align: center;
}
h1 {
  margin: 0;
  font-size: clamp(2rem, 5vw, 4.4rem);
  letter-spacing: .07em;
  color: var(--cyan);
  text-shadow: 0 0 22px rgba(0,255,255,.35);
}
.subtitle {
  max-width: 980px;
  margin: 12px auto 0;
  color: var(--muted);
  line-height: 1.55;
  font-size: 1.02rem;
}
.shell {
  width: min(1240px, calc(100% - 28px));
  margin: 0 auto 34px;
  display: grid;
  grid-template-columns: 390px 1fr;
  gap: 18px;
}
.card {
  border: 1px solid var(--border);
  background: var(--panel);
  border-radius: 22px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card h2 {
  margin: 0;
  padding: 16px 18px;
  color: var(--cyan);
  border-bottom: 1px solid rgba(0,255,255,.22);
  background: linear-gradient(90deg, rgba(0,255,255,.13), transparent);
  font-size: 1.25rem;
}
.form {
  padding: 18px;
  display: grid;
  gap: 14px;
}
label {
  display: block;
  color: var(--gold);
  font-weight: bold;
  margin-bottom: 7px;
  letter-spacing: .025em;
}
select, input[type="number"], input[type="text"], textarea {
  width: 100%;
  padding: 12px 13px;
  border-radius: 13px;
  border: 1px solid rgba(0,255,255,.36);
  background: #08171d;
  color: var(--ink);
  outline: none;
  font-size: 1rem;
  font-family: inherit;
}
textarea { min-height: 90px; resize: vertical; }
select:focus, input:focus, textarea:focus {
  box-shadow: 0 0 0 3px rgba(0,255,255,.13);
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.checkbox {
  display: flex;
  gap: 10px;
  align-items: center;
  color: var(--muted);
  line-height: 1.35;
}
.checkbox input { transform: scale(1.15); accent-color: var(--cyan); }
.btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
button {
  border: 1px solid rgba(0,255,255,.45);
  color: #031014;
  background: linear-gradient(180deg, #64ffff, #00c6c6);
  padding: 12px 14px;
  border-radius: 14px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  font-size: .98rem;
  box-shadow: 0 8px 22px rgba(0,255,255,.12);
}
button.secondary {
  background: transparent;
  color: var(--cyan);
}
button.warning {
  background: transparent;
  color: var(--danger);
  border-color: rgba(255,90,122,.45);
}
button:hover { filter: brightness(1.08); transform: translateY(-1px); }
.meta {
  margin-top: 6px;
  border: 1px dashed rgba(0,255,255,.28);
  border-radius: 16px;
  padding: 12px;
  background: rgba(0,255,255,.06);
  color: var(--muted);
  line-height: 1.5;
}
.meta strong { color: var(--ink); }
.results {
  padding: 18px;
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.search {
  max-width: 310px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
  gap: 12px;
}
.name-card {
  position: relative;
  border: 1px solid rgba(0,255,255,.24);
  border-radius: 18px;
  padding: 14px;
  background:
    linear-gradient(145deg, rgba(0,255,255,.08), rgba(255,255,255,.025)),
    rgba(255,255,255,.025);
  min-height: 150px;
}
.name {
  font-size: 1.36rem;
  color: #fff;
  margin: 0 0 7px;
  line-height: 1.2;
}
.name small {
  display: block;
  color: var(--cyan);
  font-size: .78rem;
  margin-top: 5px;
  letter-spacing: .04em;
}
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0;
}
.tag {
  border: 1px solid rgba(232,199,110,.35);
  color: var(--gold);
  border-radius: 999px;
  padding: 4px 8px;
  font-size: .8rem;
}
.mini {
  color: var(--muted);
  font-size: .9rem;
  line-height: 1.4;
}
.copy {
  margin-top: 11px;
  width: 100%;
  padding: 8px 9px;
  border-radius: 11px;
}
.history {
  padding: 16px 18px 20px;
  border-top: 1px solid rgba(0,255,255,.16);
}
.history-list {
  display: grid;
  gap: 8px;
  max-height: 250px;
  overflow: auto;
  padding-right: 5px;
}
.history-item {
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.035);
  border-radius: 12px;
  padding: 9px 10px;
  color: var(--muted);
}
.history-item b { color: var(--ink); }
.footer-note {
  width: min(1240px, calc(100% - 28px));
  margin: 0 auto 30px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
  font-size: .92rem;
}

.advanced-panel {
  border: 1px solid rgba(0,255,255,.24);
  background: rgba(0,255,255,.055);
  border-radius: 18px;
  padding: 13px;
  display: grid;
  gap: 11px;
}
.advanced-panel h3 {
  margin: 0;
  color: var(--cyan);
  font-size: 1.04rem;
  letter-spacing: .03em;
}
.range-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.range-row {
  display: grid;
  gap: 5px;
}
.range-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.range-top label { margin: 0; }
.range-value {
  color: var(--ink);
  border: 1px solid rgba(232,199,110,.35);
  border-radius: 999px;
  padding: 2px 8px;
  min-width: 42px;
  text-align: center;
  font-size: .84rem;
}
input[type="range"] {
  width: 100%;
  accent-color: var(--cyan);
}
.range-hints {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: .78rem;
}
.profile-note {
  color: var(--muted);
  border: 1px dashed rgba(232,199,110,.25);
  background: rgba(0,0,0,.18);
  border-radius: 13px;
  padding: 9px 10px;
  line-height: 1.45;
  font-size: .9rem;
}
.voice-line {
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.btns.slim { grid-template-columns: 1fr 1fr; }
@media (min-width: 1120px) {
  .range-grid.voice-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 920px) {
  .shell { grid-template-columns: 1fr; }
  .row, .btns { grid-template-columns: 1fr; }
  header { padding-top: 24px; }
}
@media print {
  body { background: white; color: black; }
  .card { box-shadow: none; border-color: #333; background: white; }
  h1, .card h2, label { color: black; text-shadow: none; }
  button, .toolbar, .form, .history { display: none !important; }
  .shell { display:block; width: 100%; }
}
&lt;/style&gt;

function $(id) { return document.getElementById(id); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
function titleCase(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function hashSeed(str) {
  let h = 2166136261;
  for (let i = 0; i &lt; str.length; i++) {
    h ^= str.charCodeAt(i);
    h += (h &lt;&lt; 1) + (h &lt;&lt; 4) + (h &lt;&lt; 7) + (h &lt;&lt; 8) + (h &lt;&lt; 24);
  }
  return Math.abs(h &gt;&gt;&gt; 0);
}

function seededPick(arr, salt = "") {
  const seedText = $("seed").value.trim();
  if (!seedText) return pick(arr);
  const n = hashSeed(seedText + salt + Date.now().toString().slice(-4) + Math.random());
  return arr[n % arr.length];
}

function populateCategories() {
  $("category").innerHTML = RACE_CATEGORIES.map(c =&gt; `&lt;option value="${c.id}"&gt;${c.id}. ${c.category}&lt;/option&gt;`).join("");
}

function populateGenders() {
  $("gender").innerHTML = GENDERS.map(g =&gt; `&lt;option value="${g}"&gt;${g}&lt;/option&gt;`).join("");
}

function populateClasses() {
  const classNames = Object.keys(CLASS_DATA);
  $("primaryClass").innerHTML = classNames.map(c =&gt; `&lt;option value="${escapeHtml(c)}"&gt;${escapeHtml(c)}&lt;/option&gt;`).join("");
  $("secondaryClass").innerHTML = [
    `&lt;option value="__none"&gt;No Multiclass&lt;/option&gt;`,
    `&lt;option value="__multiclass"&gt;Multiclass / Open Secondary&lt;/option&gt;`,
    ...classNames.map(c =&gt; `&lt;option value="${escapeHtml(c)}"&gt;${escapeHtml(c)}&lt;/option&gt;`)
  ].join("");
  populateSubclassSelect("primaryClass", "primarySubclass", false);
  populateSubclassSelect("secondaryClass", "secondarySubclass", true);
}

function populateSubclassSelect(classSelectId, subclassSelectId, isSecondary = false) {
  const classValue = $(classSelectId).value;
  let options = [];
  if (isSecondary &amp;&amp; classValue === "__none") {
    options = [{value:"__none", label:"No Secondary Subclass"}];
  } else if (isSecondary &amp;&amp; classValue === "__multiclass") {
    options = [{value:"__multiclass", label:"Multiclass / Open Subclass"}];
    Object.entries(CLASS_DATA).forEach(([className, subclasses]) =&gt; {
      subclasses.forEach(sub =&gt; {
        const label = sub === "—" ? `${className} — Core` : `${className} — ${sub}`;
        options.push({value:`${className}::${sub}`, label});
      });
    });
  } else {
    const subclasses = CLASS_DATA[classValue] || ["—"];
    options = subclasses.map(sub =&gt; ({value: sub, label: sub === "—" ? "— Core / No Subclass" : sub}));
  }
  $(subclassSelectId).innerHTML = options.map(o =&gt; `&lt;option value="${escapeHtml(o.value)}"&gt;${escapeHtml(o.label)}&lt;/option&gt;`).join("");
}

function formatSubclass(subclassValue) {
  if (!subclassValue || subclassValue === "__none") return "None";
  if (subclassValue === "__multiclass") return "Open Subclass";
  if (subclassValue.includes("::")) {
    const [className, subclass] = subclassValue.split("::");
    return `${className} ${subclass === "—" ? "Core" : subclass}`;
  }
  return subclassValue === "—" ? "Core" : subclassValue;
}

function getClassBundle() {
  const primaryClass = $("primaryClass")?.value || Object.keys(CLASS_DATA)[0];
  const primarySubclass = $("primarySubclass")?.value || "—";
  const secondaryValue = $("secondaryClass")?.value || "__none";
  const secondarySubclass = $("secondarySubclass")?.value || "__none";
  const secondaryClass = secondaryValue === "__none" ? "None" : secondaryValue === "__multiclass" ? "Multiclass" : secondaryValue;
  const isMulticlass = secondaryValue !== "__none";
  const primaryPath = `${primaryClass} (${formatSubclass(primarySubclass)})`;
  const secondaryPath = !isMulticlass ? "No Multiclass" : `${secondaryClass} (${formatSubclass(secondarySubclass)})`;
  return { primaryClass, primarySubclass, secondaryClass, secondarySubclass, isMulticlass, primaryPath, secondaryPath, classPath: isMulticlass ? `${primaryPath} / ${secondaryPath}` : primaryPath };
}

function populateRaces() {
  const cat = getCategory();
  $("race").innerHTML = cat.races.map(r =&gt; `&lt;option value="${escapeHtml(r)}"&gt;${r}&lt;/option&gt;`).join("");
  updateMeta();
}

function getCategory() {
  return RACE_CATEGORIES.find(c =&gt; String(c.id) === $("category").value) || RACE_CATEGORIES[0];
}

function getStyle() {
  return STYLE[$("category").value] || STYLE[1];
}

function escapeHtml(str) {
  return String(str).replace(/[&amp;&lt;&gt;"']/g, s =&gt; ({"&amp;":"&amp;amp;","&lt;":"&amp;lt;","&gt;":"&amp;gt;","\"":"&amp;quot;","'":"&amp;#39;"}[s]));
}

function cleanFantasyMarks(name) {
  if ($("apostrophes").checked) return name;
  return name.replace(/[’']/g, "").replace(/-/g, "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function genderBucket(gender) {
  if (gender.includes("Female") &amp;&amp; !gender.includes("Flexible")) return "feminine";
  if (gender.includes("Male") &amp;&amp; !gender.includes("Female") &amp;&amp; !gender.includes("Flexible")) return "masculine";
  if (gender === "Cis-Male" || gender === "Trans-Male") return "masculine";
  if (gender === "Cis-Female" || gender === "Trans-Female") return "feminine";
  if (gender === "Demi-Male") return Math.random() &lt; .62 ? "masculine" : "neutral";
  if (gender === "Demi-Female") return Math.random() &lt; .62 ? "feminine" : "neutral";
  if (gender === "Gender-Flexible") return pick(["masculine","feminine","neutral"]);
  if (gender === "Bi-Gender" || gender === "Poly-Gender" || gender === "Gender-Fluid") return pick(["masculine","feminine","neutral"]);
  return "neutral";
}

function hasEl(id) { return !!document.getElementById(id); }
function getRaceProfile(race = null) {
  const key = race || (hasEl("race") ? $("race").value : "");
  return RACE_PROFILES[key] || null;
}
function getNameInfluence() {
  if (!hasEl("nameInfluence")) return 82;
  if (hasEl("useCompendium") &amp;&amp; !$("useCompendium").checked) return 0;
  return clamp(parseInt($("nameInfluence").value || "82", 10), 0, 100);
}
function weightedPool(base, extras, influence) {
  const cleanExtras = Array.from(new Set((extras || []).filter(Boolean)));
  if (!cleanExtras.length || influence &lt;= 0) return base.slice();
  const repeats = influence &gt; 88 ? 5 : influence &gt; 70 ? 4 : influence &gt; 45 ? 3 : influence &gt; 20 ? 2 : 1;
  let out = base.slice();
  for (let i = 0; i &lt; repeats; i++) out = out.concat(cleanExtras);
  return out;
}
function raceFlavor(race) {
  const compact = race.replace(/[^A-Za-z]/g, "");
  const parts = [];
  for (let i = 0; i &lt; compact.length; i += 2) parts.push(compact.slice(i, i + 3).toLowerCase());
  const profile = getRaceProfile(race);
  const influence = getNameInfluence();
  const docSeeds = profile &amp;&amp; influence &gt; 0 ? (profile.nameStarts || []).map(s =&gt; s.toLowerCase()) : [];
  return Array.from(new Set(docSeeds.concat(parts.filter(p =&gt; p.length &gt;= 2))));
}
function profileNameBits(race) {
  const profile = getRaceProfile(race);
  if (!profile || getNameInfluence() &lt;= 0) return {starts:[], mids:[], ends:[], left:[], right:[], keywords:[]};
  return {
    starts: profile.nameStarts || [],
    mids: profile.nameMids || [],
    ends: profile.nameEnds || [],
    left: profile.surnameLeft || [],
    right: profile.surnameRight || [],
    keywords: profile.keywords || []
  };
}
const VOICE_SLIDERS = [
  {id:"voicePitch", label:"Pitch", low:"deep", mid:"balanced", high:"bright"},
  {id:"voiceSpeed", label:"Speed", low:"slow", mid:"measured", high:"quick"},
  {id:"voiceInflection", label:"Inflection", low:"flat", mid:"natural", high:"melodic"},
  {id:"voiceStutter", label:"Stutters", low:"steady", mid:"occasional hesitations", high:"frequent stutters"},
  {id:"voiceBreath", label:"Breathiness", low:"crisp", mid:"soft-breathed", high:"airy"},
  {id:"voiceRoughness", label:"Roughness", low:"smooth", mid:"textured", high:"gravelly"},
  {id:"voiceResonance", label:"Resonance", low:"thin", mid:"rounded", high:"booming"},
  {id:"voiceFormality", label:"Formality", low:"casual", mid:"polite", high:"ceremonial"}
];
function sliderWord(v, spec) {
  if (v &lt;= 32) return spec.low;
  if (v &gt;= 68) return spec.high;
  return spec.mid;
}
function readVoiceControls() {
  const out = {};
  VOICE_SLIDERS.forEach(spec =&gt; out[spec.id.replace("voice", "").toLowerCase()] = hasEl(spec.id) ? parseInt($(spec.id).value || "50", 10) : 50);
  return out;
}
function applyVoiceValues(values) {
  const map = {
    voicePitch:"pitch", voiceSpeed:"speed", voiceInflection:"inflection", voiceStutter:"stutter",
    voiceBreath:"breath", voiceRoughness:"roughness", voiceResonance:"resonance", voiceFormality:"formality"
  };
  Object.entries(map).forEach(([id, key]) =&gt; {
    if (!hasEl(id)) return;
    const val = clamp(parseInt(values[key] ?? $(id).value ?? 50, 10), 0, 100);
    $(id).value = val;
    if (hasEl(id + "Value")) $(id + "Value").textContent = val;
  });
}
function applyRaceVoiceDefaults() {
  const profile = getRaceProfile();
  applyVoiceValues(profile &amp;&amp; profile.voiceDefaults ? profile.voiceDefaults : {pitch:50,speed:50,inflection:50,stutter:8,breath:30,roughness:20,resonance:55,formality:55});
  updateVoicePreview();
}
function randomizeVoiceControls() {
  const profile = getRaceProfile();
  const base = profile &amp;&amp; profile.voiceDefaults ? profile.voiceDefaults : {pitch:50,speed:50,inflection:50,stutter:8,breath:30,roughness:20,resonance:55,formality:55};
  const varied = {};
  Object.entries(base).forEach(([k, v]) =&gt; varied[k] = clamp(Math.round(v + (Math.random() * 24 - 12)), 0, 100));
  applyVoiceValues(varied);
  updateVoicePreview();
}
function voiceProfileSummary(profile = getRaceProfile(), values = readVoiceControls()) {
  const labelFor = id =&gt; {
    const spec = VOICE_SLIDERS.find(x =&gt; x.id === id);
    const key = id.replace("voice", "").toLowerCase();
    return sliderWord(values[key], spec);
  };
  const loreBits = profile ? (profile.keywords || []).slice(0, 5).join(", ") : "custom";
  const tendency = profile &amp;&amp; profile.tendency ? ` ${profile.tendency}.` : "";
  return `${labelFor("voicePitch")} pitch, ${labelFor("voiceSpeed")} speed, ${labelFor("voiceInflection")} inflection, ${labelFor("voiceStutter")}, ${labelFor("voiceBreath")} breath, ${labelFor("voiceRoughness")} texture, ${labelFor("voiceResonance")} resonance, ${labelFor("voiceFormality")} diction. Lore cues: ${loreBits}.${tendency}`;
}
function updateVoicePreview() {
  VOICE_SLIDERS.forEach(spec =&gt; {
    if (hasEl(spec.id + "Value") &amp;&amp; hasEl(spec.id)) $(spec.id + "Value").textContent = $(spec.id).value;
  });
  if (hasEl("nameInfluenceValue") &amp;&amp; hasEl("nameInfluence")) $("nameInfluenceValue").textContent = $("nameInfluence").value;
  if (hasEl("voicePreview")) $("voicePreview").innerHTML = `&lt;strong&gt;Generated voice:&lt;/strong&gt; ${escapeHtml(voiceProfileSummary())}`;
  if (hasEl("compendiumMeta")) {
    const p = getRaceProfile();
    $("compendiumMeta").innerHTML = p ? `&lt;strong&gt;Doc cues:&lt;/strong&gt; ${escapeHtml(p.description || "No description.")}&lt;br&gt;&lt;strong&gt;Axis / tendency:&lt;/strong&gt; ${escapeHtml(p.tendency || p.axis || "Not listed.")}&lt;br&gt;&lt;strong&gt;Name keywords:&lt;/strong&gt; ${escapeHtml((p.keywords || []).slice(0, 8).join(", "))}` : "No compendium profile found for this race.";
  }
}
function syncRaceControls(applyDefault = false) {
  if (applyDefault &amp;&amp; hasEl("autoVoice") &amp;&amp; $("autoVoice").checked) applyRaceVoiceDefaults();
  else updateVoicePreview();
  updateMeta();
}
function initVoiceControls() {
  VOICE_SLIDERS.forEach(spec =&gt; {
    if (hasEl(spec.id)) $(spec.id).addEventListener("input", updateVoicePreview);
  });
  if (hasEl("nameInfluence")) $("nameInfluence").addEventListener("input", updateVoicePreview);
  if (hasEl("useCompendium")) $("useCompendium").addEventListener("change", () =&gt; { updateVoicePreview(); updateMeta(); });
  if (hasEl("resetVoice")) $("resetVoice").addEventListener("click", applyRaceVoiceDefaults);
  if (hasEl("randomVoice")) $("randomVoice").addEventListener("click", randomizeVoiceControls);
  applyRaceVoiceDefaults();
}

function classFlavor(bundle) {
  const words = [bundle.primarySubclass, bundle.secondarySubclass]
    .join(" ")
    .replace(/__none|__multiclass|Core|Open|Subclass|Secondary|Multiclass|No/gi, " ")
    .replace(/[^A-Za-z ]/g, " ")
    .split(/\s+/)
    .filter(w =&gt; w.length &gt;= 3)
    .map(w =&gt; w.slice(0, 5).toLowerCase());
  const suffixes = [];
  if (CLASS_SUFFIXES[bundle.primaryClass]) suffixes.push(...CLASS_SUFFIXES[bundle.primaryClass]);
  if (CLASS_SUFFIXES[bundle.secondaryClass]) suffixes.push(...CLASS_SUFFIXES[bundle.secondaryClass]);
  return Array.from(new Set(words.concat(suffixes)));
}

function firstName(race, gender, index, bundle) {
  const st = getStyle();
  const bucket = genderBucket(gender);
  const influence = getNameInfluence();
  const profileBits = profileNameBits(race);
  const classBits = classFlavor(bundle);
  const classStarts = Math.random() &lt; .35 ? classBits.slice(0, 2).map(titleCase) : [];
  const classMids = Math.random() &lt; .25 ? classBits.slice(0, 2).map(s =&gt; s.slice(0, 2)) : [];
  const classEnds = Math.random() &lt; .22 ? classBits.slice(0, 2) : [];
  const starts = weightedPool(st.start.concat(raceFlavor(race).slice(0, 3).map(titleCase)).concat(classStarts), profileBits.starts, influence);
  const mids = weightedPool(st.mid.concat(classMids), profileBits.mids, Math.round(influence * .72));
  const genderEnds = bucket === "masculine" ? st.endM : bucket === "feminine" ? st.endF : st.endN;
  const ends = weightedPool(genderEnds.concat(classEnds), profileBits.ends, Math.round(influence * .55));
  let name = seededPick(starts, "s" + index) + seededPick(mids, "m" + index) + seededPick(ends, "e" + index);
  if (influence &gt; 65 &amp;&amp; Math.random() &lt; .18 &amp;&amp; profileBits.starts.length) name = seededPick(profileBits.starts, "rs" + index) + name.slice(Math.floor(name.length / 3));
  if (Math.random() &lt; .16) name = seededPick(starts, "s2" + index) + "-" + name;
  if ($("apostrophes").checked &amp;&amp; Math.random() &lt; (influence &gt; 70 ? .16 : .12)) {
    const pos = clamp(2 + Math.floor(Math.random() * Math.max(1, name.length - 4)), 2, name.length - 2);
    name = name.slice(0, pos) + "’" + name.slice(pos);
  }
  return cleanFantasyMarks(name.replace(/(.)\1\1+/g, "$1$1"));
}

function surname(race, index, bundle) {
  const st = getStyle();
  const mode = $("surnameMode").value;
  const classBits = classFlavor(bundle);
  const influence = getNameInfluence();
  const profileBits = profileNameBits(race);
  let left, right;
  const loreLeft = weightedPool(st.sur, profileBits.left, influence);
  const loreRight = weightedPool(st.sur2, profileBits.right.concat(classBits.slice(0, 3)), Math.max(25, influence));
  if (mode === "race") {
    const rf = raceFlavor(race).concat(profileBits.left.map(x =&gt; x.toLowerCase()));
    left = titleCase(seededPick(weightedPool(st.sur, rf.length ? rf : st.sur, influence), "rl" + index));
    right = seededPick(loreRight, "rr" + index);
  } else if (mode === "class") {
    const classPool = classBits.length ? classBits : st.sur;
    left = titleCase(seededPick(weightedPool(classPool.map(titleCase), profileBits.left, Math.round(influence * .35)), "cl" + index));
    right = seededPick(weightedPool(classPool.concat(st.sur2), profileBits.right, Math.round(influence * .35)), "cr" + index);
  } else if (mode === "mixed") {
    const allStyles = Object.values(STYLE);
    const a = seededPick(allStyles, "ml" + index);
    const b = seededPick(allStyles, "mr" + index);
    left = seededPick(weightedPool(a.sur.concat(classBits.slice(0, 2).map(titleCase)), profileBits.left, influence), "msl" + index);
    right = seededPick(weightedPool(b.sur2.concat(classBits.slice(0, 3)), profileBits.right, influence), "msr" + index);
  } else {
    const subtleClass = Math.random() &lt; .2 ? classBits.slice(0, 1) : [];
    left = seededPick(loreLeft, "sl" + index);
    right = seededPick(loreRight.concat(subtleClass), "sr" + index);
  }
  let s = left + right;
  if ($("apostrophes").checked &amp;&amp; Math.random() &lt; (influence &gt; 70 ? .14 : .1)) s = left + "-" + titleCase(right);
  return cleanFantasyMarks(s);
}

function generateOne(index) {
  const cat = getCategory();
  const race = $("race").value;
  const gender = $("gender").value;
  const classBundle = getClassBundle();
  const profile = getRaceProfile(race);
  const voiceSettings = readVoiceControls();
  let first = firstName(race, gender, index, classBundle);
  let last = surname(race, index, classBundle);
  let full = `${first} ${last}`;
  let honor = "";
  let epithet = "";
  if ($("titles").checked &amp;&amp; Math.random() &lt; .3) {
    const classTitles = classFlavor(classBundle).map(titleCase).filter(x =&gt; x.length &gt; 3);
    const loreTitles = profile ? (profile.surnameLeft || []).slice(0, 4) : [];
    honor = pick(HONORIFICS.concat(classTitles).concat(loreTitles));
    full = `${honor} ${full}`;
  }
  if ($("titles").checked &amp;&amp; Math.random() &lt; .25) {
    const classEpithets = classFlavor(classBundle).map(x =&gt; `the ${titleCase(x)}-Marked`);
    const loreEpithets = profile ? (profile.keywords || []).slice(0, 4).map(x =&gt; `the ${titleCase(x)}-Touched`) : [];
    epithet = pick(EPITHETS.concat(classEpithets).concat(loreEpithets));
    full = `${full}, ${epithet}`;
  }
  return {
    fullName: full,
    firstName: first,
    lastName: last,
    honorific: honor,
    epithet,
    genderIdentity: gender,
    race,
    raceCategory: cat.category,
    creatorGod: cat.god,
    raceDescription: profile ? profile.description : cat.description,
    raceTendency: profile ? (profile.tendency || profile.axis) : "",
    nameKeywords: profile ? (profile.keywords || []) : [],
    primaryClass: classBundle.primaryClass,
    primarySubclass: formatSubclass(classBundle.primarySubclass),
    secondaryClass: classBundle.secondaryClass,
    secondarySubclass: formatSubclass(classBundle.secondarySubclass),
    isMulticlass: classBundle.isMulticlass,
    classPath: classBundle.classPath,
    voiceSettings,
    voiceProfile: voiceProfileSummary(profile, voiceSettings),
    generatedAt: new Date().toISOString()
  };
}

function generate() {
  const count = clamp(parseInt($("count").value || "10", 10), 1, 100);
  $("count").value = count;
  lastResults = Array.from({length: count}, (_, i) =&gt; generateOne(i));
  history = lastResults.concat(history).slice(0, 250);
  renderResults();
  renderHistory();
}

function renderResults() {
  const q = $("filter").value.trim().toLowerCase();
  const visible = lastResults.filter(r =&gt; Object.values(r).join(" ").toLowerCase().includes(q));
  $("resultCount").textContent = `${visible.length} shown / ${lastResults.length} generated`;
  $("results").innerHTML = visible.map((r, i) =&gt; `
    &lt;article class="name-card"&gt;
      &lt;h3 class="name"&gt;${escapeHtml(r.fullName)}&lt;small&gt;${escapeHtml(r.firstName)} + ${escapeHtml(r.lastName)}&lt;/small&gt;&lt;/h3&gt;
      &lt;div class="tags"&gt;
        &lt;span class="tag"&gt;${escapeHtml(r.genderIdentity)}&lt;/span&gt;
        &lt;span class="tag"&gt;${escapeHtml(r.race)}&lt;/span&gt;
        &lt;span class="tag"&gt;${escapeHtml(r.primaryClass)}&lt;/span&gt;
        ${r.isMulticlass ? `&lt;span class="tag"&gt;Multiclass&lt;/span&gt;` : ""}
      &lt;/div&gt;
      &lt;p class="mini"&gt;&lt;strong&gt;Category:&lt;/strong&gt; ${escapeHtml(r.raceCategory)}&lt;br&gt;&lt;strong&gt;Creator God:&lt;/strong&gt; ${escapeHtml(r.creatorGod)}&lt;br&gt;&lt;strong&gt;Class Path:&lt;/strong&gt; ${escapeHtml(r.classPath)}&lt;br&gt;&lt;strong&gt;Race Cues:&lt;/strong&gt; ${escapeHtml((r.nameKeywords || []).slice(0, 6).join(", "))}&lt;/p&gt;
      &lt;p class="mini voice-line"&gt;&lt;strong&gt;Voice:&lt;/strong&gt; ${escapeHtml(r.voiceProfile || "")}&lt;/p&gt;
      &lt;button class="secondary copy" onclick="copyText('${encodeURIComponent(r.fullName)}')"&gt;Copy Name&lt;/button&gt;
    &lt;/article&gt;
  `).join("");
}

function renderHistory() {
  if (!history.length) {
    $("history").innerHTML = `&lt;div class="history-item"&gt;No saved session history yet.&lt;/div&gt;`;
    return;
  }
  $("history").innerHTML = history.slice(0, 60).map(r =&gt; `
    &lt;div class="history-item"&gt;&lt;b&gt;${escapeHtml(r.fullName)}&lt;/b&gt;&lt;br&gt;${escapeHtml(r.genderIdentity)} · ${escapeHtml(r.race)} · ${escapeHtml(r.raceCategory)}&lt;/div&gt;
  `).join("");
}

function updateMeta() {
  const cat = getCategory();
  const race = $("race").value || cat.races[0];
  const st = getStyle();
  const profile = getRaceProfile(race);
  const bundle = (document.getElementById("primaryClass") &amp;&amp; document.getElementById("secondaryClass")) ? getClassBundle() : null;
  $("raceMeta").innerHTML = `
    &lt;strong&gt;${escapeHtml(race)}&lt;/strong&gt;&lt;br&gt;
    &lt;strong&gt;Family:&lt;/strong&gt; ${escapeHtml(cat.category)}&lt;br&gt;
    &lt;strong&gt;Creator God:&lt;/strong&gt; ${escapeHtml(cat.god)}&lt;br&gt;
    &lt;strong&gt;Family Flavor:&lt;/strong&gt; ${escapeHtml(cat.description)}&lt;br&gt;
    ${profile &amp;&amp; profile.description ? `&lt;strong&gt;Race-Doc Flavor:&lt;/strong&gt; ${escapeHtml(profile.description)}&lt;br&gt;` : ""}
    ${profile &amp;&amp; (profile.tendency || profile.axis) ? `&lt;strong&gt;Axis Tone:&lt;/strong&gt; ${escapeHtml(profile.tendency || profile.axis)}&lt;br&gt;` : ""}
    ${bundle ? `&lt;strong&gt;Class Flavor:&lt;/strong&gt; ${escapeHtml(bundle.classPath)}&lt;br&gt;` : ""}
    &lt;strong&gt;Name Style:&lt;/strong&gt; ${escapeHtml(st.label)}&lt;br&gt;
    &lt;strong&gt;Voice Default:&lt;/strong&gt; ${escapeHtml(voiceProfileSummary(profile, readVoiceControls()))}
  `;
}

function copyText(encoded) {
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text).then(() =&gt; {
    $("resultCount").textContent = `Copied: ${text}`;
  });
}

function copyAll() {
  const text = lastResults.map(r =&gt; `${r.fullName} — ${r.genderIdentity}; ${r.race}; ${r.raceCategory}; ${r.classPath}; Voice: ${r.voiceProfile}`).join("\n");
  navigator.clipboard.writeText(text || "").then(() =&gt; $("resultCount").textContent = "Copied all generated names and voice notes.");
}

function download(filename, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportJson() {
  download("belavados_generated_names.json", JSON.stringify(lastResults, null, 2), "application/json");
}

function csvEscape(v) {
  return `"${String(v ?? "").replace(/"/g, '""')}"`;
}

function exportCsv() {
  const headers = ["Full Name","First Name","Last Name","Gender Identity","Race","Race Category","Creator God","Primary Class","Primary Subclass","Secondary Class","Secondary Subclass","Class Path","Race Description","Race Tendency","Name Keywords","Voice Profile","Voice Settings JSON","Generated At"];
  const rows = lastResults.map(r =&gt; [r.fullName,r.firstName,r.lastName,r.genderIdentity,r.race,r.raceCategory,r.creatorGod,r.primaryClass,r.primarySubclass,r.secondaryClass,r.secondarySubclass,r.classPath,r.raceDescription,r.raceTendency,(r.nameKeywords || []).join(" | "),r.voiceProfile,JSON.stringify(r.voiceSettings || {}),r.generatedAt].map(csvEscape).join(","));
  download("belavados_generated_names_with_voice.csv", headers.map(csvEscape).join(",") + "\n" + rows.join("\n"), "text/csv");
}

function randomRace() {
  const cat = pick(RACE_CATEGORIES);
  $("category").value = String(cat.id);
  populateRaces();
  $("race").value = pick(cat.races);
  $("gender").value = pick(GENDERS);
  syncRaceControls(true);
}

$("category").addEventListener("change", () =&gt; { populateRaces(); syncRaceControls(true); });
$("race").addEventListener("change", () =&gt; syncRaceControls(true));
$("gender").addEventListener("change", updateMeta);
$("primaryClass").addEventListener("change", () =&gt; { populateSubclassSelect("primaryClass", "primarySubclass", false); updateMeta(); });
$("primarySubclass").addEventListener("change", updateMeta);
$("secondaryClass").addEventListener("change", () =&gt; { populateSubclassSelect("secondaryClass", "secondarySubclass", true); updateMeta(); });
$("secondarySubclass").addEventListener("change", updateMeta);
$("filter").addEventListener("input", renderResults);
$("generate").addEventListener("click", generate);
$("randomize").addEventListener("click", randomRace);
$("copyAll").addEventListener("click", copyAll);
$("downloadJson").addEventListener("click", exportJson);
$("downloadCsv").addEventListener("click", exportCsv);
$("clearHistory").addEventListener("click", () =&gt; { history = []; renderHistory(); });

populateCategories();
populateGenders();
populateClasses();
populateRaces();
initVoiceControls();
renderHistory();
generate();

&lt;body&gt;
&lt;header&gt;
  &lt;h1&gt;Belavadös Audio Voice Creator Studio&lt;/h1&gt;
  &lt;p class="subtitle"&gt;Scanner-dominant NPC and bot voice builder. Upload NPC JSON or paste plain personality notes, let race/ancestry, class, alignment, gender identity, and personality guide the base voice, then fine-tune the voice with simple character-style sliders, preview emotions, cache the emotions you want, and export one standalone JavaScript voice profile.&lt;/p&gt;
  &lt;nav class="site-tabs"&gt;&lt;a href="#generator" onclick="parent.CharacterStudioSwitch&amp;&amp;parent.CharacterStudioSwitch('generator');return false;"&gt;Generator Tab&lt;/a&gt;&lt;a class="active" href="#studio" onclick="parent.CharacterStudioSwitch&amp;&amp;parent.CharacterStudioSwitch('studio');return false;"&gt;Voice Studio Tab&lt;/a&gt;&lt;/nav&gt;&lt;nav class="topnav"&gt;&lt;a href="#generator" onclick="parent.CharacterStudioSwitch&amp;&amp;parent.CharacterStudioSwitch('generator');return false;"&gt;Open Generator Alone&lt;/a&gt;&lt;a class="secondary" href="docs/VOICE_STUDIO_README.md"&gt;Read Studio Notes&lt;/a&gt;&lt;/nav&gt;
&lt;/header&gt;
&lt;main&gt;
  &lt;section class="card"&gt;&lt;h2&gt;NPC / Bot Input&lt;/h2&gt;&lt;div class="panel"&gt;
    &lt;div&gt;&lt;label for="jsonFile"&gt;Upload NPC JSON&lt;/label&gt;&lt;input id="jsonFile" type="file" accept=".json,application/json"&gt;&lt;p class="mini"&gt;Supported fields include name, race/species, genderIdentity, class, alignment, personality, and Belavadös axes.&lt;/p&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label for="jsonInput"&gt;Paste NPC JSON or plain personality notes&lt;/label&gt;&lt;textarea id="jsonInput" placeholder='{"name":"Joeari Ravenwood","race":"Elf (Core Elves)","genderIdentity":"Gender-Flexible","class":"Bard","alignment":"Neutral Good","personality":"solemn protective spirit bard; grave sincere tender, quietly funny"}&amp;#10;&amp;#10;Or paste plain text: precise high-elf scholar, elegant, dry, calm, brilliant, gently loyal demi-female voice.'&gt;&lt;/textarea&gt;&lt;/div&gt;
    &lt;div class="btnrow"&gt;&lt;button class="btn secondary" id="useJsonText"&gt;Use Pasted Text&lt;/button&gt;&lt;button class="btn" id="applyNpc"&gt;Apply Fields&lt;/button&gt;&lt;/div&gt;
    &lt;div class="row"&gt;&lt;div&gt;&lt;label for="npcName"&gt;Name&lt;/label&gt;&lt;input id="npcName" type="text"&gt;&lt;/div&gt;&lt;div&gt;&lt;label for="npcRace"&gt;Race&lt;/label&gt;&lt;select id="npcRace"&gt;&lt;/select&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div class="row"&gt;&lt;div&gt;&lt;label for="npcGender"&gt;Gender Identity&lt;/label&gt;&lt;select id="npcGender"&gt;&lt;/select&gt;&lt;/div&gt;&lt;div&gt;&lt;label for="npcClass"&gt;Class&lt;/label&gt;&lt;select id="npcClass"&gt;&lt;/select&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label for="npcSubclass"&gt;Subclass / Path / Bloodline Role&lt;/label&gt;&lt;select id="npcSubclass"&gt;&lt;/select&gt;&lt;p class="mini"&gt;Loaded from the class and subclass voice JSON. Pick base/no subclass or a specific path.&lt;/p&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label for="npcAlignment"&gt;Traditional Alignment&lt;/label&gt;&lt;select id="npcAlignment"&gt;&lt;/select&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label for="npcBiome"&gt;Regional Voice / Biome Accent&lt;/label&gt;&lt;select id="npcBiome"&gt;&lt;/select&gt;&lt;p class="mini"&gt;Uses fantasy regional accent names. Biome sets the accent base; race and class decide how it lands.&lt;/p&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label for="npcPersonality"&gt;Personality / Tone Notes&lt;/label&gt;&lt;textarea id="npcPersonality"&gt;&lt;/textarea&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label&gt;Belavadös Alignment Axes&lt;/label&gt;&lt;div class="axis-grid"&gt;&lt;div&gt;&lt;label for="axisAltruism"&gt;Altruism&lt;/label&gt;&lt;input id="axisAltruism" type="number" min="0" max="3000" value="1500"&gt;&lt;/div&gt;&lt;div&gt;&lt;label for="axisLawfulness"&gt;Lawfulness&lt;/label&gt;&lt;input id="axisLawfulness" type="number" min="0" max="3000" value="1500"&gt;&lt;/div&gt;&lt;div&gt;&lt;label for="axisCooperation"&gt;Cooperation&lt;/label&gt;&lt;input id="axisCooperation" type="number" min="0" max="3000" value="1500"&gt;&lt;/div&gt;&lt;div&gt;&lt;label for="axisHonor"&gt;Honor&lt;/label&gt;&lt;input id="axisHonor" type="number" min="0" max="3000" value="1500"&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;div&gt;&lt;label&gt;Auto-Voice Influence Mix&lt;/label&gt;&lt;div class="influence-grid"&gt;
      &lt;div class="influence-row"&gt;&lt;div class="slider-head"&gt;&lt;label for="influenceRace"&gt;Race / Ancestry Influence&lt;/label&gt;&lt;output id="out_influenceRace"&gt;100%&lt;/output&gt;&lt;/div&gt;&lt;input id="influenceRace" type="range" min="0" max="100" step="1" value="100"&gt;&lt;p class="mini"&gt;How strongly the selected race or ancestry shapes the base pitch, depth, texture, and pacing.&lt;/p&gt;&lt;/div&gt;
      &lt;div class="influence-row"&gt;&lt;div class="slider-head"&gt;&lt;label for="influenceGender"&gt;Gender Identity Influence&lt;/label&gt;&lt;output id="out_influenceGender"&gt;100%&lt;/output&gt;&lt;/div&gt;&lt;input id="influenceGender" type="range" min="0" max="100" step="1" value="100"&gt;&lt;p class="mini"&gt;How strongly the selected gender identity nudges the voice. This is inclusive and adjustable, not locked.&lt;/p&gt;&lt;/div&gt;
      &lt;div class="influence-row"&gt;&lt;div class="slider-head"&gt;&lt;label for="influencePersonality"&gt;Personality Influence&lt;/label&gt;&lt;output id="out_influencePersonality"&gt;100%&lt;/output&gt;&lt;/div&gt;&lt;input id="influencePersonality" type="range" min="0" max="100" step="1" value="100"&gt;&lt;p class="mini"&gt;How strongly typed personality words like tender, stern, gruff, anxious, regal, warm, or spooky shape the base voice.&lt;/p&gt;&lt;/div&gt;

<script>
(function(){
  const frames = {
    generator: document.getElementById('frame-generator'),
    studio: document.getElementById('frame-studio')
  };
  const tabs = {
    generator: document.getElementById('tab-generator'),
    studio: document.getElementById('tab-studio')
  };
  const ranges = {
    x: [document.getElementById('top-x-scroll'), document.getElementById('bottom-x-scroll')],
    y: [document.getElementById('left-y-scroll'), document.getElementById('right-y-scroll')]
  };
  const status = document.getElementById('frame-status');
  let active = 'generator';
  let syncing = false;

  frames.generator.srcdoc = document.getElementById('generator-html-source').value;
  frames.studio.srcdoc = document.getElementById('studio-html-source').value;

  function activeFrame(){ return frames[active]; }
  function frameDoc(){
    const frame = activeFrame();
    try { return frame.contentDocument || frame.contentWindow.document; } catch(e) { return null; }
  }
  function scrollEl(){
    const doc = frameDoc();
    if(!doc) return null;
    return doc.scrollingElement || doc.documentElement || doc.body;
  }
  function maxScroll(el, axis){
    if(!el) return 0;
    return axis === 'x' ? Math.max(0, el.scrollWidth - el.clientWidth) : Math.max(0, el.scrollHeight - el.clientHeight);
  }
  function updateRanges(){
    const el = scrollEl();
    if(!el || syncing) return;
    syncing = true;
    const maxX = maxScroll(el,'x');
    const maxY = maxScroll(el,'y');
    ranges.x.forEach(r => { r.max = String(Math.max(1,maxX)); r.value = String(Math.min(maxX, el.scrollLeft)); });
    ranges.y.forEach(r => { r.max = String(Math.max(1,maxY)); r.value = String(Math.min(maxY, el.scrollTop)); });
    syncing = false;
  }
  function injectPaddingFix(frame){
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if(!doc || doc.getElementById('character-studio-runtime-padding-fix')) return;
      const style = doc.createElement('style');
      style.id = 'character-studio-runtime-padding-fix';
      style.textContent = `
        :root{scroll-padding:100px 82px 100px 82px;}
        html,body{scrollbar-gutter:stable both-edges;overflow:auto!important;}
        body{padding-left:clamp(28px,3vw,72px)!important;padding-right:clamp(28px,3vw,72px)!important;}
        main{max-width:none!important;}
        .card,.panel,.module,section,fieldset,.voice-panel,.preview-card,.control-card{padding:clamp(18px,1.8vw,30px)!important;}
        .card h2,.card h3,.panel h2,.panel h3{padding-block:clamp(18px,1.4vw,24px)!important;padding-inline:clamp(24px,2vw,32px)!important;}
        button,.btn,input,select,textarea,label,a{line-height:1.35!important;}
        button,.btn,input[type=button],input[type=submit],select{min-height:48px!important;padding:13px 16px!important;}
        textarea,input[type=text],input[type=number],input[type=file]{padding:14px 16px!important;}
        input[type=range]{min-height:38px!important;padding:6px 2px!important;}
        .grid,.row,.controls,.slider-grid,.button-row,.topnav,.site-tabs,.btnrow,.media-grid,.media-controls{gap:clamp(14px,1.4vw,22px)!important;}
        #voiceSliders{gap:18px!important;}
      `;
      doc.head && doc.head.appendChild(style);
      const onScroll = () => requestAnimationFrame(updateRanges);
      doc.addEventListener('scroll', onScroll, {passive:true});
      frame.contentWindow.addEventListener('resize', updateRanges);
    } catch(e) {}
  }
  Object.values(frames).forEach(frame => frame.addEventListener('load', () => { injectPaddingFix(frame); updateRanges(); }));

  function switchTab(tab){
    if(!frames[tab]) tab = 'generator';
    active = tab;
    for(const key of Object.keys(frames)){
      frames[key].classList.toggle('active', key === tab);
      tabs[key].classList.toggle('active', key === tab);
      tabs[key].setAttribute('aria-selected', key === tab ? 'true' : 'false');
    }
    status.textContent = (tab === 'generator' ? 'Generator' : 'Voice Studio') + ' active';
    location.hash = tab;
    setTimeout(updateRanges, 100);
  }
  window.CharacterStudioSwitch = switchTab;
  Object.values(tabs).forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  function setScroll(axis, value){
    const el = scrollEl();
    if(!el || syncing) return;
    const n = Number(value)||0;
    if(axis === 'x') el.scrollLeft = n; else el.scrollTop = n;
    updateRanges();
  }
  ranges.x.forEach(r => r.addEventListener('input', () => setScroll('x', r.value)));
  ranges.y.forEach(r => r.addEventListener('input', () => setScroll('y', r.value)));
  document.querySelectorAll('[data-scroll-step]').forEach(btn => btn.addEventListener('click', () => {
    const [axis, amount] = btn.dataset.scrollStep.split(':');
    const el = scrollEl();
    if(!el) return;
    if(axis === 'x') el.scrollBy({left:Number(amount),behavior:'smooth'});
    else el.scrollBy({top:Number(amount),behavior:'smooth'});
    setTimeout(updateRanges, 180);
  }));
  window.addEventListener('resize', updateRanges);
  setInterval(updateRanges, 800);
  if(location.hash && location.hash.toLowerCase().includes('studio')) switchTab('studio'); else switchTab('generator');
})();
</script>
